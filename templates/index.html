<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ファイルアップローダー</title>
    <style>
        #progress-container { width: 100%; background: #eee; border-radius: 5px; margin: 20px 0; display: none; }
        #progress-bar { width: 0%; height: 20px; background: #4CAF50; border-radius: 5px; text-align: center; color: white; line-height: 20px; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>画像・動画アップロード</h1>
    <input type="file" id="fileInput" multiple>
    <button onclick="uploadFiles()">アップロード開始</button>

    <div id="progress-container">
        <div id="progress-bar">0%</div>
    </div>
    <div id="status"></div>

    <script>
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            if (files.length === 0) return alert("ファイルを選んでね！");

            const progressBar = document.getElementById('progress-bar');
            const container = document.getElementById('progress-container');
            const status = document.getElementById('status');

            container.style.display = 'block';
            let successCount = 0;
            let skippedCount = 0;
            let errorCount = 0;

            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('photo', files[i]); // 1枚ずつ送信

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (result.status === 'success') successCount++;
                    else if (result.status === 'skipped') skippedCount++;
                    else errorCount++;

                } catch (e) {
                    errorCount++;
                }

                // プログレスバーの更新
                const percent = Math.round(((i + 1) / files.length) * 100);
                progressBar.style.width = percent + '%';
                progressBar.innerText = percent + '%';
                status.innerText = `${i + 1} / ${files.length} 件処理中...`;
            }

            status.innerHTML = `完了！<br>新規: ${successCount}、スキップ: ${skippedCount}、エラー: ${errorCount}`;
        }
    </script>
</body>
</html>
